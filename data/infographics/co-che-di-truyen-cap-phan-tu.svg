<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- DNA Card Gradient -->
    <linearGradient id="dnaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <!-- RNA Card Gradient -->
    <linearGradient id="rnaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>

    <!-- Protein Card Gradient -->
    <linearGradient id="proteinGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#be185d" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bgGrad)" />

  <!-- Grid overlay -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="500" />
    <line x1="200" y1="0" x2="200" y2="500" />
    <line x1="300" y1="0" x2="300" y2="500" />
    <line x1="400" y1="0" x2="400" y2="500" />
    <line x1="500" y1="0" x2="500" y2="500" />
    <line x1="600" y1="0" x2="600" y2="500" />
    <line x1="700" y1="0" x2="700" y2="500" />
  </g>

  <!-- Title -->
  <text x="400" y="45" font-family="sans-serif" font-size="24" font-weight="bold" fill="#ec4899" text-anchor="middle" letter-spacing="1">CƠ CHẾ DI TRUYỀN CẤP PHÂN TỬ</text>
  <text x="400" y="70" font-family="sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Luồng thông tin di truyền: ADN → ARN → Protein (Học thuyết Trung tâm)</text>

  <!-- DNA Box -->
  <g transform="translate(100, 150)">
    <rect width="180" height="120" rx="12" fill="url(#dnaGrad)" />
    <text x="90" y="45" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">ADN</text>
    <text x="90" y="70" font-family="sans-serif" font-size="12" fill="#bfdbfe" text-anchor="middle">(Gen cấu trúc)</text>
    <text x="90" y="90" font-family="sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">Lưu trữ thông tin di truyền</text>
    <!-- Self Replication Loop -->
    <path d="M-10 60 C-30 20, 20 -20, 40 5" fill="none" stroke="#60a5fa" stroke-width="3" stroke-dasharray="3" />
    <polygon points="40,5 30,3 38,-3" fill="#60a5fa" />
    <text x="10" y="-12" font-family="sans-serif" font-size="11" fill="#60a5fa">Nhân đôi</text>
  </g>

  <!-- Transcription Arrow (Phiên mã) -->
  <g transform="translate(290, 190)">
    <line x1="0" y1="20" x2="110" y2="20" stroke="#a78bfa" stroke-width="4" />
    <polygon points="120,20 108,14 108,26" fill="#a78bfa" />
    <text x="55" y="10" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a78bfa" text-anchor="middle">Phiên mã</text>
    <text x="55" y="42" font-family="sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">Trong nhân tế bào</text>
  </g>

  <!-- RNA Box -->
  <g transform="translate(420, 150)">
    <rect width="180" height="120" rx="12" fill="url(#rnaGrad)" />
    <text x="90" y="45" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">mARN</text>
    <text x="90" y="70" font-family="sans-serif" font-size="12" fill="#e9d5ff" text-anchor="middle">(Bản sao thông tin)</text>
    <text x="90" y="90" font-family="sans-serif" font-size="11" fill="#c084fc" text-anchor="middle">Truyền đạt mã di truyền</text>
  </g>

  <!-- Translation Arrow (Dịch mã) -->
  <g transform="translate(490, 280)">
    <line x1="20" y1="0" x2="20" y2="80" stroke="#f472b6" stroke-width="4" />
    <polygon points="20,90 14,78 26,78" fill="#f472b6" />
    <text x="80" y="50" font-family="sans-serif" font-size="12" font-weight="bold" fill="#f472b6" text-anchor="middle">Dịch mã</text>
    <text x="85" y="70" font-family="sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">Tại Ribôxôm</text>
  </g>

  <!-- Protein Box -->
  <g transform="translate(420, 380)">
    <rect width="180" height="80" rx="12" fill="url(#proteinGrad)" />
    <text x="90" y="35" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Chuỗi Polipeptit</text>
    <text x="90" y="58" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fbcfe8" text-anchor="middle">PROTEIN</text>
  </g>

  <!-- Phenotype Box (Biểu hiện tính trạng) -->
  <g transform="translate(100, 380)">
    <rect width="180" height="80" rx="12" fill="none" stroke="#f472b6" stroke-width="2" stroke-dasharray="4" />
    <text x="90" y="45" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f472b6" text-anchor="middle">Tính trạng</text>
    <text x="90" y="65" font-family="sans-serif" font-size="11" fill="#cbd5e1" text-anchor="middle">(Biểu hiện kiểu hình)</text>
  </g>

  <!-- Left connection from Protein to Phenotype -->
  <g transform="translate(290, 420)">
    <line x1="120" y1="0" x2="10" y2="0" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4" />
    <polygon points="0,0 12,-5 12,5" fill="#cbd5e1" />
  </g>
</svg>
